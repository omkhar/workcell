[env]
# The exec-guard crate interposes process-global syscall/exec hooks on Linux,
# so its test harness must stay single-threaded for deterministic runs.
RUST_TEST_THREADS = "1"

[target.'cfg(target_os = "linux")']
rustflags = [
  "-C",
  "debuginfo=0",
  "-C",
  "link-arg=-Wl,--build-id=none",
  "--remap-path-prefix=/workspace=.",
  "--remap-path-prefix=/tmp=.",
  "--remap-path-prefix=/workcell-rust=.",
]

[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"
