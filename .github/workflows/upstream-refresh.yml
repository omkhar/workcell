name: Upstream refresh

on:
  schedule:
    - cron: "15 13 * * 1-5"
  workflow_dispatch:

permissions: {}

env:
  WORKCELL_COSIGN_VERSION: v3.0.6

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh pinned upstreams
    runs-on: ubuntu-latest
    environment:
      name: upstream-refresh
    permissions:
      contents: read # Read the reviewed tree to compute the candidate bundle.
      issues: write # Update the rolling tracking issue with the latest candidate status.
      pull-requests: read # Detect overlapping refresh PRs before generating a candidate.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - name: Refresh pinned upstreams
        run: ./scripts/update-upstream-pins.sh --apply

      - id: changes
        name: Detect refreshed content
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Re-check refreshed pin state
        if: steps.changes.outputs.changed == 'true'
        run: |
          ./scripts/update-upstream-pins.sh --check
          ./scripts/check-pinned-inputs.sh

      - id: existing_pr
        name: Detect overlapping upstream refresh PRs
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr_url="$(
            gh pr list \
              --state open \
              --json title,url,headRefName \
              --jq 'map(select(.title == "Refresh pinned upstreams" or (.headRefName | startswith("codex/upstream-refresh-")))) | .[0].url // ""'
          )"
          if [[ -n "${existing_pr_url}" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "url=${existing_pr_url}" >> "${GITHUB_OUTPUT}"
            echo "Upstream refresh PR already open: ${existing_pr_url}"
            exit 0
          fi
          echo "skip=false" >> "${GITHUB_OUTPUT}"

      - id: candidate
        name: Build candidate bundle
        if: steps.changes.outputs.changed == 'true' && steps.existing_pr.outputs.skip != 'true'
        run: |
          candidate_dir="${RUNNER_TEMP}/upstream-refresh-candidate"
          mkdir -p "${candidate_dir}"

          git diff --binary --full-index --patch --no-ext-diff --no-color > "${candidate_dir}/patch"
          git diff --stat --no-color > "${candidate_dir}/diffstat"

          tmp_index="$(mktemp "${RUNNER_TEMP}/upstream-refresh-index.XXXXXX")"
          rm -f "${tmp_index}"
          trap 'rm -f "${tmp_index}"' EXIT
          GIT_INDEX_FILE="${tmp_index}" git read-tree HEAD
          GIT_INDEX_FILE="${tmp_index}" git add -A
          tree_oid="$(GIT_INDEX_FILE="${tmp_index}" git write-tree)"
          rm -f "${tmp_index}"
          trap - EXIT

          patch_sha256="$(shasum -a 256 "${candidate_dir}/patch" | awk '{print $1}')"
          changed_files_json="$(git diff --name-only | jq -R . | jq -s .)"
          jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflow "upstream-refresh" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg artifact_name "upstream-refresh-candidate" \
            --arg base_ref "${GITHUB_REF}" \
            --arg base_sha "$(git rev-parse HEAD)" \
            --arg patch_sha256 "${patch_sha256}" \
            --arg tree_oid "${tree_oid}" \
            --argjson changed_files "${changed_files_json}" \
            '{
              version: 1,
              repository: $repository,
              workflow: $workflow,
              run_id: (env.GITHUB_RUN_ID | tonumber),
              run_url: $run_url,
              artifact_name: $artifact_name,
              base_ref: $base_ref,
              base_sha: $base_sha,
              patch_sha256: $patch_sha256,
              tree_oid: $tree_oid,
              changed_files: $changed_files
            }' > "${candidate_dir}/metadata.json"

          echo "dir=${candidate_dir}" >> "${GITHUB_OUTPUT}"

      - name: Upload candidate artifact
        if: steps.candidate.outputs.dir != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-refresh-candidate
          if-no-files-found: error
          path: |
            ${{ steps.candidate.outputs.dir }}/patch
            ${{ steps.candidate.outputs.dir }}/diffstat
            ${{ steps.candidate.outputs.dir }}/metadata.json

      - name: Update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          REFRESH_CHANGED: ${{ steps.changes.outputs.changed }}
          REFRESH_SKIP: ${{ steps.existing_pr.outputs.skip }}
          REFRESH_EXISTING_PR_URL: ${{ steps.existing_pr.outputs.url }}
          CANDIDATE_DIR: ${{ steps.candidate.outputs.dir }}
        run: |
          tracking_label="upstream-refresh-candidate"
          tracking_title="Upstream refresh candidate"
          issue_body="$(mktemp "${RUNNER_TEMP}/workcell-upstream-refresh-issue.XXXXXX.md")"

          if [[ "$(gh label list --json name --jq 'map(select(.name == "upstream-refresh-candidate")) | length')" == "0" ]]; then
            gh label create "${tracking_label}" --color "0E8A16" --description "Latest upstream refresh candidate tracking issue"
          fi

          if [[ "${REFRESH_CHANGED}" != 'true' ]]; then
            {
              echo "## Latest result"
              echo
              echo "No upstream refresh changes were detected."
              echo
              echo "- run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "- base ref: ${GITHUB_REF}"
              echo "- base sha: $(git rev-parse HEAD)"
            } > "${issue_body}"
          elif [[ "${REFRESH_SKIP}" == 'true' ]]; then
            {
              echo "## Latest result"
              echo
              echo "Skipped candidate publication because a refresh PR is already open:"
              echo "${REFRESH_EXISTING_PR_URL}"
              echo
              echo "- run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "- base ref: ${GITHUB_REF}"
              echo "- base sha: $(git rev-parse HEAD)"
            } > "${issue_body}"
          else
            metadata_path="${CANDIDATE_DIR}/metadata.json"
            diffstat_path="${CANDIDATE_DIR}/diffstat"
            {
              echo "## Latest candidate"
              echo
              echo "- run: $(jq -r '.run_url' "${metadata_path}")"
              echo "- artifact: \`$(jq -r '.artifact_name' "${metadata_path}")\`"
              echo "- base ref: \`$(jq -r '.base_ref' "${metadata_path}")\`"
              echo "- base sha: \`$(jq -r '.base_sha' "${metadata_path}")\`"
              echo "- patch sha256: \`$(jq -r '.patch_sha256' "${metadata_path}")\`"
              echo "- tree oid: \`$(jq -r '.tree_oid' "${metadata_path}")\`"
              echo
              echo "## Changed files"
              echo
              jq -r '.changed_files[] | "- `" + . + "`"' "${metadata_path}"
              echo
              echo "## Diffstat"
              echo
              echo '```'
              cat "${diffstat_path}"
              echo '```'
            } > "${issue_body}"
          fi

          issues_json="$(
            gh issue list \
              --state all \
              --label "${tracking_label}" \
              --limit 10 \
              --json number,state
          )"
          issue_count="$(jq 'length' <<<"${issues_json}")"
          if [[ "${issue_count}" -gt 1 ]]; then
            echo "Expected at most one ${tracking_label} issue, found ${issue_count}." >&2
            exit 1
          fi
          if [[ "${issue_count}" -eq 0 ]]; then
            gh issue create --title "${tracking_title}" --body-file "${issue_body}" --label "${tracking_label}" >/dev/null
            exit 0
          fi

          issue_number="$(jq -r '.[0].number' <<<"${issues_json}")"
          issue_state="$(jq -r '.[0].state | ascii_downcase' <<<"${issues_json}")"
          if [[ "${issue_state}" == "closed" ]]; then
            gh issue reopen "${issue_number}" >/dev/null
          fi
          gh issue edit "${issue_number}" --title "${tracking_title}" --body-file "${issue_body}" --add-label "${tracking_label}" >/dev/null
