name: Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 1 * * 6"
  workflow_dispatch:

permissions: {}

# Note: scorecard.yml intentionally does NOT carry a workflow-level
# `defaults:` block.  The ossf/scorecard-action rejects workflows with
# global env vars or `defaults`
# (https://github.com/ossf/scorecard-action#workflow-restrictions), so
# the strict-bash defaults that every other workflow uses cannot be
# applied here.  Steps that need strict mode must set it inline.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks: read # Read existing check metadata that Scorecard correlates in its report.
      contents: read
      id-token: write # Mint an OIDC token for Scorecard provenance checks.
      issues: read # Read issue metadata used by Scorecard's review signals.
      pull-requests: read # Read pull request metadata used by Scorecard's review signals.
      security-events: write # Upload SARIF results to GitHub code scanning when enabled.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        if: ${{ !github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_SCORECARD_SARIF == 'true' }}
        with:
          sarif_file: results.sarif
