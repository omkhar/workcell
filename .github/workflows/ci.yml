name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:37539dd4d60fc70968d164d3850d903a2c56f6402214a1953fbf9fcb81ada731
  WORKCELL_BUILDX_VERSION: v0.32.1
  WORKCELL_COSIGN_VERSION: v3.0.5
  WORKCELL_QEMU_IMAGE: tonistiigi/binfmt:qemu-v10.0.4-56@sha256:30cc9a4d03765acac9be2ed0afc23af1ad018aed2c28ea4be8c2eb9afe03fbd1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check pinned input policy
        run: ./scripts/check-pinned-inputs.sh

      - name: Verify build input manifest determinism
        run: ./scripts/verify-build-input-manifest.sh

      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - name: Verify upstream Codex release
        run: ./scripts/verify-upstream-codex-release.sh

      - name: Verify upstream Claude release
        run: ./scripts/verify-upstream-claude-release.sh

      - name: Build validation tool image
        run: |
          docker build \
            -f tools/validator/Dockerfile \
            -t workcell-validator:${{ github.sha }} \
            .

      - name: Validate repository
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            workcell-validator:${{ github.sha }} \
            ./scripts/validate-repo.sh

      - name: Verify host launcher invariants
        run: ./scripts/verify-invariants.sh

      - name: Verify release bundle reproducibility
        env:
          WORKCELL_RELEASE_BUNDLE_NAME: workcell-${{ github.sha }}.tar.gz
          WORKCELL_RELEASE_BUNDLE_PREFIX: workcell-${{ github.sha }}
          WORKCELL_RELEASE_BUNDLE_REF: ${{ github.sha }}
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
        run: ./scripts/verify-release-bundle.sh

  container-smoke:
    name: Container smoke
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Workcell container smoke
        run: ./scripts/container-smoke.sh

  reproducible-build-platform:
    name: Reproducible build (${{ matrix.platform_name }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_name: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Verify reproducible runtime build
        env:
          WORKCELL_REPRO_PLATFORMS: ${{ matrix.platform }}
        run: ./scripts/verify-reproducible-build.sh

  reproducible-build:
    name: Reproducible build
    runs-on: ubuntu-latest
    needs: reproducible-build-platform
    steps:
      - name: Confirm per-platform reproducible builds passed
        run: true
