name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:

permissions: {}

# GitHub's default bash invocation gives `-eo pipefail` but leaves `-u`
# off; explicit strict mode here matches scripts/lib/trusted-entrypoint.sh
# and prevents an unset-variable expansion from silently no-op-ing a
# CI step.
defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
  WORKCELL_BUILDX_VERSION: v0.35.0
  WORKCELL_COSIGN_VERSION: v3.1.1
  WORKCELL_QEMU_IMAGE: tonistiigi/binfmt:qemu-v10.2.3-68@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-shape:
    name: Pull request shape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check pull request shape
        if: ${{ github.event_name == 'pull_request' }}
        env:
          WORKCELL_PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          WORKCELL_PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: ./scripts/ci/job-pr-shape.sh --base "${WORKCELL_PR_BASE_REF}"

      - name: Skip outside pull requests
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "PR shape gate applies only to pull requests."

  validate:
    name: Validate repository
    needs: pr-shape
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Validate repository
        env:
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_MODE: gha
          # Segregate the gha cache scope: PR runs write to a PR-keyed
          # scope, push-to-main writes to validator-main.  build-validator-image.sh
          # also reads validator-main as a base for PR builds.  mode=max
          # is gated on push events so PRs cannot poison the trusted scope.
          WORKCELL_VALIDATOR_BUILDX_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('validator-pr-{0}', github.event.pull_request.number) || 'validator-main' }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_WRITE_MODE: ${{ github.event_name == 'push' && 'max' || 'min' }}
          WORKCELL_CI_INSTALL_ARTIFACT_DIR: dist/release-install
          WORKCELL_CI_ARCHIVE_REF: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          token_file="$(umask 077 && mktemp "${RUNNER_TEMP}/workcell-github-token.XXXXXX")"; trap 'rm -f "${token_file}"' EXIT
          (umask 077 && printf '%s' "${GITHUB_TOKEN}" >"${token_file}")
          unset GITHUB_TOKEN GH_TOKEN
          WORKCELL_GITHUB_API_TOKEN_FILE="${token_file}" ./scripts/ci/job-validate.sh --profile pr-parity

      - name: Upload CI release install artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workcell-ci-install-candidate
          path: |
            dist/release-install/workcell-ci-${{ github.sha }}.tar.gz
            dist/release-install/workcell.rb
            dist/release-install/SHA256SUMS
          retention-days: 7

  container-smoke:
    name: Container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only gated on pr-shape (not validate): container smoke builds and runs the
    # runtime image independently and consumes no validate output, so running it
    # in parallel with validate removes it from the gating critical path.
    needs: pr-shape
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Workcell container smoke
        run: ./scripts/container-smoke.sh

  install-verification:
    name: Install verification (${{ matrix.runner_label }})
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'approved-heavy-ci') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            runner_label: macos-26
          - runner: macos-15
            runner_label: macos-15
    steps:
      - name: Download CI release install artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workcell-ci-install-candidate
          path: dist/install

      - name: Verify install bundle checksum
        # The validate job produced SHA256SUMS over the bundle; the
        # checksum check here makes a flaky upload (or any future
        # third-job mutation to the artifact) a hard error before we
        # extract or install.  Use `shasum -a 256 -c` rather than
        # `sha256sum -c`: the install-verification matrix runs on
        # macos-26 and macos-15, neither of which ships sha256sum
        # (coreutils is not pre-installed), but both ship shasum.  The
        # SHA256SUMS line format is identical between the two tools.
        run: |
          test -f dist/install/SHA256SUMS
          (cd dist/install && shasum -a 256 -c SHA256SUMS)

      - name: Verify release bundle installer
        env:
          HOME: ${{ runner.temp }}/workcell-home-bundle
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}"
          bundle_path="$(find dist/install -maxdepth 1 -type f -name 'workcell-*.tar.gz' -print -quit)"
          if [[ -z "${bundle_path}" ]]; then
            echo "Missing CI release bundle artifact" >&2
            exit 1
          fi
          extract_root="${RUNNER_TEMP}/bundle-install"
          rm -rf "${extract_root}"
          mkdir -p "${extract_root}"
          tar -xzf "${bundle_path}" -C "${extract_root}"
          bundle_dir="$(find "${extract_root}" -mindepth 1 -maxdepth 1 -type d -name 'workcell-*' -print -quit)"
          if [[ -z "${bundle_dir}" ]]; then
            echo "Unable to locate extracted bundle root" >&2
            exit 1
          fi
          "${bundle_dir}/scripts/install.sh"
          "${HOME}/.local/bin/workcell" --help >/dev/null
          HOME="${HOME}" "${bundle_dir}/scripts/uninstall.sh"
          test ! -e "${HOME}/.local/bin/workcell"
          test ! -e "${HOME}/.local/share/man/man1/workcell.1"

      - name: Verify Homebrew formula install
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          bundle_path="$(find dist/install -maxdepth 1 -type f -name 'workcell-*.tar.gz' -print -quit)"
          if [[ -z "${bundle_path}" ]]; then
            echo "Missing CI release bundle artifact" >&2
            exit 1
          fi
          bundle_path="$(cd "$(dirname "${bundle_path}")" && pwd -P)/$(basename "${bundle_path}")"
          tap_name="workcell/local-ci"
          formula_path="${RUNNER_TEMP}/workcell-local.rb"
          brew tap-new "${tap_name}" --no-git
          tap_dir="$(brew --repo "${tap_name}")"
          mkdir -p "${tap_dir}/Formula"
          cp dist/install/workcell.rb "${tap_dir}/Formula/workcell.rb"
          formula_path="${tap_dir}/Formula/workcell.rb"
          expected_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/ci-${GITHUB_SHA}/$(basename "${bundle_path}")"
          grep -F "url \"${expected_url}\"" "${formula_path}" >/dev/null
          BUNDLE_FILE_URL="file://${bundle_path}" perl -0pi -e 's{^  url ".*"$}{"  url \"" . $ENV{BUNDLE_FILE_URL} . "\""}me' "${formula_path}"
          brew install "${tap_name}/workcell"
          brew test "${tap_name}/workcell"
          brew uninstall --force "${tap_name}/workcell"
          if brew list --versions workcell >/dev/null 2>&1; then
            echo "Expected brew uninstall to remove the workcell formula" >&2
            exit 1
          fi
          brew cleanup workcell >/dev/null 2>&1 || true
          brew untap "${tap_name}" >/dev/null 2>&1 || true

  reproducible-build-platform:
    name: Reproducible build (${{ matrix.platform_name }})
    # Heavy: two ~45-minute no-cache double-builds. Gate the fork-PR trigger
    # behind the approved-heavy-ci label (mirroring install-verification, CodeQL,
    # and mutation) so an unreviewed fork PR cannot spend this compute on demand.
    # Release-time reproducibility assurance is preserved independently: every
    # push to main still runs this job, and release.yml re-verifies reproducibility
    # natively in preflight-amd64-repro / preflight-arm64-repro before publish.
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'approved-heavy-ci') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    # Only gated on pr-shape (not validate): the reproducible build runs its own
    # checkout + buildx + no-cache double-build and consumes no validate output,
    # so running it in parallel with validate removes ~5m of serialization from
    # the gating critical path.
    needs: pr-shape
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_name: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Verify reproducible runtime build
        env:
          WORKCELL_REPRO_PLATFORMS: ${{ matrix.platform }}
        run: ./scripts/verify-reproducible-build.sh

  reproducible-build:
    name: Reproducible build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: reproducible-build-platform
    steps:
      - name: Confirm per-platform reproducible builds passed
        env:
          REPRO_BUILD_RESULT: ${{ needs.reproducible-build-platform.result }}
        run: |
          # 'skipped' is a pass: on an unlabeled fork PR the heavy per-platform
          # builds are label-gated off, and reproducibility is re-verified on the
          # post-merge main push and independently in release preflight. Any real
          # outcome other than success/skipped (failure, cancelled) still fails
          # this required check.
          case "${REPRO_BUILD_RESULT}" in
            success | skipped) ;;
            *)
              echo "Expected per-platform reproducible builds to succeed or be skipped, got ${REPRO_BUILD_RESULT}" >&2
              exit 1
              ;;
          esac
