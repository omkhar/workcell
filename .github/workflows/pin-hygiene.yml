name: Pin Hygiene

# This workflow is the WEEKLY-CRON pin-hygiene lane only.  The
# per-pull-request pin enforcement runs inside ci.yml::validate via
# scripts/ci/job-validate.sh, which calls scripts/check-pinned-inputs.sh,
# scripts/verify-upstream-{codex,claude,gemini}-release.sh, and
# scripts/update-upstream-pins.sh --check on every PR.  This lane runs
# the same checks on a schedule so drift gets caught even if PRs do not
# touch pin files.

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_COSIGN_VERSION: v3.0.6

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinned-inputs:
    name: Check pinned inputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - name: Check pinned upstream hygiene
        run: ./scripts/ci/job-pin-hygiene.sh
