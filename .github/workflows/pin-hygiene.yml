name: Pin Hygiene

# This workflow is the WEEKLY-CRON pin-hygiene lane.  scripts/ci/job-validate.sh
# runs scripts/check-pinned-inputs.sh,
# scripts/verify-upstream-{codex,claude,copilot,gemini}-release.sh, and (on the
# release-preflight profile only) scripts/update-upstream-pins.sh --check.
# This cron lane catches snapshot/digest drift independently of PR
# activity.  The full update-upstream-pins --check is intentionally not
# in PR parity because upstream-release availability drift would block routine
# PR work; Debian bootstrap pins now update atomically.

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_COSIGN_VERSION: v3.1.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinned-inputs:
    name: Check pinned inputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - name: Check pinned upstream hygiene
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          token_file="$(umask 077 && mktemp "${RUNNER_TEMP}/workcell-github-token.XXXXXX")"; trap 'rm -f "${token_file}"' EXIT
          (umask 077 && printf '%s' "${GITHUB_TOKEN}" >"${token_file}")
          unset GITHUB_TOKEN GH_TOKEN
          WORKCELL_GITHUB_API_TOKEN_FILE="${token_file}" ./scripts/ci/job-pin-hygiene.sh
