name: Pin Hygiene

# This workflow is the WEEKLY-CRON pin-hygiene lane.  scripts/ci/job-validate.sh
# runs scripts/check-pinned-inputs.sh,
# scripts/verify-upstream-{codex,claude,gemini}-release.sh, and (on the
# release-preflight profile only) scripts/update-upstream-pins.sh --check.
# This cron lane catches snapshot/digest drift independently of PR
# activity.  The full update-upstream-pins --check is intentionally not
# in the pr-parity profile yet: until that script handles the openssl
# bootstrap pins atomically with the DEBIAN_SNAPSHOT bump it produces a
# non-buildable Dockerfile, which would block routine PR work.

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_COSIGN_VERSION: v3.0.6

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinned-inputs:
    name: Check pinned inputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - name: Check pinned upstream hygiene
        run: ./scripts/ci/job-pin-hygiene.sh
