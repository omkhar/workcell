name: Pin Hygiene

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:

permissions: {}

env:
  WORKCELL_COSIGN_VERSION: v3.0.5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinned-inputs:
    name: Check pinned inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check pinned input policy
        run: ./scripts/check-pinned-inputs.sh

      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Verify upstream Codex release
        run: ./scripts/verify-upstream-codex-release.sh
