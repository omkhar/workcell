name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: ${{ (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.ref_name != 'main')) && (!github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_DEPENDENCY_REVIEW == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || '' }}
          config-file: ./.github/dependency-review-config.yml
          head-ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || '' }}

  actionlint:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint
        env:
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL \
            --retry 3 \
            --retry-delay 2 \
            --retry-connrefused \
            --max-time 60 \
            --connect-timeout 15 \
            --max-filesize 209715200 \
            -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf actionlint.tar.gz actionlint
          install -m 0755 actionlint "${RUNNER_TEMP}/bin/actionlint"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Install zizmor
        env:
          ZIZMOR_SHA256: 8556289a64e7aaf2400cd516f61a471aa91c5902cc56ad96a82fd12f90c2ef73
          ZIZMOR_VERSION: 1.26.1
        run: |
          curl -fsSL \
            --retry 3 \
            --retry-delay 2 \
            --retry-connrefused \
            --max-time 60 \
            --connect-timeout 15 \
            --max-filesize 209715200 \
            -o zizmor.tar.gz \
            "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZIZMOR_SHA256}  zizmor.tar.gz" | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf zizmor.tar.gz -C "${RUNNER_TEMP}/bin" zizmor
          chmod 0755 "${RUNNER_TEMP}/bin/zizmor"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run workflow contract checks
        run: ./scripts/check-workflows.sh

  zizmor:
    name: GitHub Actions security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read # Read workflow metadata required while emitting Zizmor SARIF.
      contents: read
      security-events: write # Upload SARIF results to GitHub code scanning when enabled.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install zizmor
        env:
          ZIZMOR_SHA256: 8556289a64e7aaf2400cd516f61a471aa91c5902cc56ad96a82fd12f90c2ef73
          ZIZMOR_VERSION: 1.26.1
        run: |
          curl -fsSL \
            --retry 3 \
            --retry-delay 2 \
            --retry-connrefused \
            --max-time 60 \
            --connect-timeout 15 \
            --max-filesize 209715200 \
            -o zizmor.tar.gz \
            "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZIZMOR_SHA256}  zizmor.tar.gz" | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf zizmor.tar.gz -C "${RUNNER_TEMP}/bin" zizmor
          chmod 0755 "${RUNNER_TEMP}/bin/zizmor"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run GitHub Actions security analysis
        run: |
          zizmor \
            --persona auditor \
            --config .github/zizmor.yml \
            .github/workflows

      - name: Generate zizmor SARIF
        if: ${{ !github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_ZIZMOR_SARIF == 'true' }}
        run: |
          zizmor \
            --persona auditor \
            --config .github/zizmor.yml \
            --format sarif \
            .github/workflows >"${RUNNER_TEMP}/zizmor.sarif"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_ZIZMOR_SARIF == 'true' }}
        with:
          name: zizmor-sarif
          path: ${{ runner.temp }}/zizmor.sarif
          retention-days: 5
