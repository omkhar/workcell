name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENABLE_GITHUB_ATTESTATIONS: ${{ vars.WORKCELL_ENABLE_GITHUB_ATTESTATIONS || 'false' }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Require tag commit on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck shfmt yamllint groff-base

      - name: Validate repository
        run: ./scripts/validate-repo.sh

      - name: Run container smoke
        run: ./scripts/container-smoke.sh

  release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs:
      - preflight
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Prepare release bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          bundle="workcell-${GITHUB_REF_NAME}.tar.gz"
          echo "BUNDLE_NAME=${bundle}" >> "${GITHUB_ENV}"
          git archive \
            --format=tar.gz \
            --prefix="workcell-${GITHUB_REF_NAME}/" \
            -o "dist/${bundle}" \
            "${GITHUB_SHA}"
          sha256sum "dist/${bundle}" > dist/SHA256SUMS

      - id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: runtime/container/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: workcell-source.spdx.json
          format: spdx-json
          output-file: dist/workcell-source.spdx.json
          path: .
          upload-artifact: false
          upload-release-assets: false

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: workcell-image.spdx.json
          format: spdx-json
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          output-file: dist/workcell-image.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign release image
        env:
          COSIGN_YES: "true"
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign "${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Sign release checksums
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --output-certificate dist/SHA256SUMS.pem \
            --output-signature dist/SHA256SUMS.sig \
            dist/SHA256SUMS

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true'
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true'
        with:
          sbom-path: dist/workcell-image.spdx.json
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true'
        with:
          subject-path: dist/${{ env.BUNDLE_NAME }}

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true'
        with:
          sbom-path: dist/workcell-source.spdx.json
          subject-path: dist/${{ env.BUNDLE_NAME }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: workcell-release-artifacts
          path: dist/*
          retention-days: 7

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
          fi
