name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENABLE_GITHUB_ATTESTATIONS: ${{ vars.WORKCELL_ENABLE_GITHUB_ATTESTATIONS || 'false' }}
  ENABLE_GITHUB_ATTESTATIONS_SUPPORTED: ${{ github.event.repository.visibility == 'public' || vars.WORKCELL_ENABLE_PRIVATE_GITHUB_ATTESTATIONS == 'true' }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0039c1d47e8748b5afea56f4e85f14febaf34452bd99d9552d2daa82262b5cc5
  WORKCELL_BUILDX_VERSION: v0.33.0
  WORKCELL_COSIGN_VERSION: v3.0.6
  WORKCELL_QEMU_IMAGE: tonistiigi/binfmt:qemu-v10.2.1-65@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3
  WORKCELL_SYFT_VERSION: v1.42.4

jobs:
  codeql-preflight:
    name: Release CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read # Read workflow metadata required by CodeQL helper actions.
      contents: read
      security-events: write # Upload SARIF results to GitHub code scanning.
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: autobuild
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - if: ${{ !github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_CODE_SCANNING == 'true' }}
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: ${{ (!github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_CODE_SCANNING == 'true') && matrix.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      - if: ${{ !github.event.repository.private || vars.WORKCELL_ENABLE_PRIVATE_CODE_SCANNING == 'true' }}
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    environment:
      name: hosted-controls-audit
    permissions:
      actions: read # Read workflow metadata needed by artifact and code-scanning actions.
      contents: read
      security-events: write # Upload SARIF results produced during release preflight scans.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: source_date
        name: Compute source date epoch
        run: echo "epoch=$(git log -1 --pretty=%ct "${GITHUB_SHA}")" >> "${GITHUB_OUTPUT}"

      - name: Require tag commit on main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Use the GitHub compare API (via gh, which is pre-authenticated) to
          # verify that the tagged commit is an ancestor of main.  The git-fetch
          # approach requires re-authenticating against a private repo and has
          # proven unreliable with the actions/checkout credential cleanup.
          cmp_status="$(gh api \
            "repos/${GITHUB_REPOSITORY}/compare/${GITHUB_SHA}...main" \
            --jq '.status' 2>/dev/null || true)"
          case "${cmp_status}" in
            ahead|identical) ;;
            *)
              echo "Tagged commit ${GITHUB_SHA} is not an ancestor of main (compare status: ${cmp_status:-error})" >&2
              exit 1
              ;;
          esac

      - name: Validate release tag name
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]

      - name: Verify GitHub-hosted controls
        env:
          WORKCELL_HOSTED_CONTROLS_REQUIRED: "1"
          WORKCELL_HOSTED_CONTROLS_TOKEN: ${{ secrets.WORKCELL_HOSTED_CONTROLS_TOKEN }}
        run: ./scripts/run-hosted-controls-audit.sh "${GITHUB_REPOSITORY}"

      - name: Check pinned input policy
        run: ./scripts/check-pinned-inputs.sh

      - name: Verify GitHub macOS release test runners
        run: ./scripts/verify-github-macos-release-test-runners.sh macos-26 macos-15

      - name: Verify build input manifest
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
          WORKCELL_BUILD_INPUT_REF: ${{ github.sha }}
        run: ./scripts/verify-build-input-manifest.sh

      - name: Verify control-plane manifest
        run: ./scripts/verify-control-plane-manifest.sh

      - name: Generate preflight build input manifest
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
          WORKCELL_BUILD_INPUT_REF: ${{ github.sha }}
        run: |
          mkdir -p dist
          ./scripts/generate-build-input-manifest.sh dist/workcell-build-inputs-preflight.json

      - name: Generate preflight control-plane manifest
        run: |
          mkdir -p dist
          ./scripts/generate-control-plane-manifest.sh dist/workcell-control-plane-preflight.json

      - name: Install actionlint
        env:
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          ACTIONLINT_VERSION: 1.7.12
        run: |
          actionlint_archive="${RUNNER_TEMP}/actionlint.tar.gz"
          actionlint_bin="${RUNNER_TEMP}/actionlint"
          curl -fsSL \
            --max-time 60 \
            --connect-timeout 15 \
            -o "${actionlint_archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${actionlint_archive}" | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf "${actionlint_archive}" -C "${RUNNER_TEMP}" actionlint
          install -m 0755 "${actionlint_bin}" "${RUNNER_TEMP}/bin/actionlint"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - name: Expose cosign in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign

      - name: Verify upstream Codex release
        run: ./scripts/verify-upstream-codex-release.sh

      - name: Verify upstream Claude release
        run: ./scripts/verify-upstream-claude-release.sh

      - name: Verify upstream Gemini release
        run: ./scripts/verify-upstream-gemini-release.sh

      - name: Require pinned upstreams to match the latest reviewed track
        run: ./scripts/update-upstream-pins.sh --check

      - name: Build validation tool image
        run: |
          docker build \
            -f tools/validator/Dockerfile \
            -t "workcell-validator:${GITHUB_SHA}" \
            .

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false
          image: ${{ env.WORKCELL_QEMU_IMAGE }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Validate repository
        run: |
          set -euo pipefail
          validator_uid="$(id -u)"
          validator_gid="$(id -g)"
          validator_home="/tmp/workcell-home-${validator_uid}"
          validator_cache="${validator_home}/.cache"
          validator_tmp="${validator_home}/.tmp"
          docker run --rm \
            --user "${validator_uid}:${validator_gid}" \
            --entrypoint /bin/bash \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e HOME="${validator_home}" \
            -e XDG_CACHE_HOME="${validator_cache}" \
            -e GOCACHE="${validator_cache}/go-build" \
            -e GOMODCACHE="${validator_cache}/go-mod" \
            -e CARGO_TARGET_DIR="${validator_cache}/cargo-target" \
            -e TMPDIR="${validator_tmp}" \
            "workcell-validator:${GITHUB_SHA}" \
            -lc '
              set -euo pipefail
              mkdir -p "${HOME}" "${XDG_CACHE_HOME}" "${GOCACHE}" "${GOMODCACHE}" "${CARGO_TARGET_DIR}" "${TMPDIR}"
              ./scripts/validate-repo.sh
            '

      - name: Verify host launcher invariants
        run: ./scripts/verify-invariants.sh

      - name: Verify release bundle reproducibility
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
          WORKCELL_RELEASE_BUNDLE_MANIFEST_PATH: dist/workcell-release-bundle-preflight.json
          WORKCELL_RELEASE_BUNDLE_NAME: workcell-${{ github.ref_name }}.tar.gz
          WORKCELL_RELEASE_BUNDLE_PREFIX: workcell-${{ github.ref_name }}
          WORKCELL_RELEASE_BUNDLE_REF: ${{ github.sha }}
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
        run: ./scripts/verify-release-bundle.sh

      - name: Build preflight release install artifacts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        run: |
          set -euo pipefail
          validator_uid="$(id -u)"
          validator_gid="$(id -g)"
          validator_home="/tmp/workcell-home-${validator_uid}"
          validator_cache="${validator_home}/.cache"
          validator_tmp="${validator_home}/.tmp"
          mkdir -p dist/release-install
          bundle="workcell-${GITHUB_REF_NAME}.tar.gz"
          docker run --rm \
            --user "${validator_uid}:${validator_gid}" \
            --entrypoint /bin/bash \
            -v "${PWD}:/workspace" \
            -v "${PWD}/dist/release-install:/dist" \
            -w /workspace \
            -e HOME="${validator_home}" \
            -e XDG_CACHE_HOME="${validator_cache}" \
            -e TMPDIR="${validator_tmp}" \
            -e SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            -e ARCHIVE_REF="${GITHUB_SHA}" \
            -e BUNDLE_NAME="${bundle}" \
            -e BUNDLE_PREFIX="workcell-${GITHUB_REF_NAME}/" \
            "workcell-validator:${GITHUB_SHA}" \
            -lc '
              set -euo pipefail
              mkdir -p "${HOME}" "${XDG_CACHE_HOME}" "${TMPDIR}"
              bundle_tar="/dist/${BUNDLE_NAME%.tar.gz}.tar"
              git -c safe.directory=/workspace archive \
                --format=tar \
                --mtime="@${SOURCE_DATE_EPOCH}" \
                --prefix="${BUNDLE_PREFIX}" \
                -o "${bundle_tar}" \
                "${ARCHIVE_REF}"
              gzip -n -9 < "${bundle_tar}" > "/dist/${BUNDLE_NAME}"
              rm -f "${bundle_tar}"
            '
          bundle_sha="$(sha256sum "dist/release-install/${bundle}" | awk '{print $1}')"
          ./scripts/generate-homebrew-formula.sh \
            "${GITHUB_REF_NAME}" \
            "${bundle_sha}" \
            dist/release-install/workcell.rb \
            --repository "${GITHUB_REPOSITORY}"

      - name: Run actionlint
        run: actionlint

      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          inputs: .github/workflows
          persona: auditor
          version: 1.23.1

      - name: Run container smoke
        run: ./scripts/container-smoke.sh

      - name: Reclaim runner space before reproducible image check
        run: |
          docker image rm -f "workcell-validator:${GITHUB_SHA}" >/dev/null 2>&1 || true
          docker container prune -f || true
          docker image prune -af || true
          docker buildx prune -af || true
          docker builder prune -af || true
          docker system df || true

      - name: Verify reproducible runtime image
        env:
          WORKCELL_REPRO_MANIFEST_PATH: dist/workcell-runtime-preflight.json
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        run: ./scripts/verify-reproducible-build.sh

      - name: Upload preflight binding manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workcell-release-preflight
          path: |
            dist/workcell-build-inputs-preflight.json
            dist/workcell-control-plane-preflight.json
            dist/workcell-release-bundle-preflight.json
            dist/workcell-runtime-preflight.json
          retention-days: 7

      - name: Upload preflight release install artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workcell-release-install-candidate
          path: |
            dist/release-install/workcell-${{ github.ref_name }}.tar.gz
            dist/release-install/workcell.rb
          retention-days: 7

  install-verification:
    name: Release install verification (${{ matrix.runner_label }})
    runs-on: ${{ matrix.runner }}
    needs:
      - preflight
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            runner_label: macos-26
          - runner: macos-15
            runner_label: macos-15
    steps:
      - name: Download preflight release install artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workcell-release-install-candidate
          path: dist/install

      - name: Verify release bundle installer
        env:
          HOME: ${{ runner.temp }}/workcell-home-bundle
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}"
          bundle_path="$(find dist/install -maxdepth 1 -type f -name 'workcell-*.tar.gz' -print -quit)"
          if [[ -z "${bundle_path}" ]]; then
            echo "Missing preflight release bundle artifact" >&2
            exit 1
          fi
          extract_root="${RUNNER_TEMP}/bundle-install"
          rm -rf "${extract_root}"
          mkdir -p "${extract_root}"
          tar -xzf "${bundle_path}" -C "${extract_root}"
          bundle_dir="$(find "${extract_root}" -mindepth 1 -maxdepth 1 -type d -name 'workcell-*' -print -quit)"
          if [[ -z "${bundle_dir}" ]]; then
            echo "Unable to locate extracted bundle root" >&2
            exit 1
          fi
          "${bundle_dir}/scripts/install.sh"
          "${HOME}/.local/bin/workcell" --help >/dev/null
          HOME="${HOME}" "${bundle_dir}/scripts/uninstall.sh"
          test ! -e "${HOME}/.local/bin/workcell"
          test ! -e "${HOME}/.local/share/man/man1/workcell.1"

      - name: Verify Homebrew formula install
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          bundle_path="$(find dist/install -maxdepth 1 -type f -name 'workcell-*.tar.gz' -print -quit)"
          if [[ -z "${bundle_path}" ]]; then
            echo "Missing preflight release bundle artifact" >&2
            exit 1
          fi
          bundle_path="$(cd "$(dirname "${bundle_path}")" && pwd -P)/$(basename "${bundle_path}")"
          tap_name="workcell/local-release"
          formula_path="${RUNNER_TEMP}/workcell-local.rb"
          brew tap-new "${tap_name}" --no-git
          tap_dir="$(brew --repo "${tap_name}")"
          mkdir -p "${tap_dir}/Formula"
          cp dist/install/workcell.rb "${tap_dir}/Formula/workcell.rb"
          formula_path="${tap_dir}/Formula/workcell.rb"
          expected_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "${bundle_path}")"
          grep -F "url \"${expected_url}\"" "${formula_path}" >/dev/null
          BUNDLE_FILE_URL="file://${bundle_path}" perl -0pi -e 's{^  url ".*"$}{"  url \"" . $ENV{BUNDLE_FILE_URL} . "\""}me' "${formula_path}"
          brew install "${tap_name}/workcell"
          brew test "${tap_name}/workcell"
          brew uninstall --force "${tap_name}/workcell"
          if brew list --versions workcell >/dev/null 2>&1; then
            echo "Expected brew uninstall to remove the workcell formula" >&2
            exit 1
          fi
          brew cleanup workcell >/dev/null 2>&1 || true
          brew untap "${tap_name}" >/dev/null 2>&1 || true

  release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs:
      - codeql-preflight
      - preflight
      - install-verification
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    permissions:
      actions: read # Read preflight artifacts from the Actions API.
      artifact-metadata: write # Publish artifact metadata alongside release assets.
      attestations: write # Generate GitHub attestations for released artifacts.
      contents: write # Create the GitHub release and upload release assets.
      id-token: write # Mint OIDC tokens for signing and attestation workflows.
      packages: write # Push the container image to GitHub Container Registry.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download preflight binding manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workcell-release-preflight
          path: dist/preflight

      - name: Validate release tag name
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]

      - id: source_date
        name: Compute source date epoch
        run: echo "epoch=$(git log -1 --pretty=%ct "${GITHUB_SHA}")" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false
          image: ${{ env.WORKCELL_QEMU_IMAGE }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.WORKCELL_COSIGN_VERSION }}

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: ${{ env.WORKCELL_SYFT_VERSION }}

      - name: Expose signing and SBOM tools in trusted system path
        run: |
          sudo install -m 0755 "$(command -v cosign)" /usr/local/bin/cosign
          sudo install -m 0755 "$(command -v syft)" /usr/local/bin/syft

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build validation tool image
        run: |
          docker build \
            -f tools/validator/Dockerfile \
            -t "workcell-validator:${GITHUB_SHA}" \
            .

      - name: Prepare release bundle
        env:
          WORKCELL_BUILDKIT_IMAGE: ${{ env.WORKCELL_BUILDKIT_IMAGE }}
          WORKCELL_BUILDX_VERSION: ${{ env.WORKCELL_BUILDX_VERSION }}
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
          WORKCELL_BUILD_INPUT_REF: ${{ github.sha }}
          WORKCELL_COSIGN_VERSION: ${{ env.WORKCELL_COSIGN_VERSION }}
          WORKCELL_QEMU_IMAGE: ${{ env.WORKCELL_QEMU_IMAGE }}
          WORKCELL_SYFT_VERSION: ${{ env.WORKCELL_SYFT_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p dist
          validator_uid="$(id -u)"
          validator_gid="$(id -g)"
          validator_home="/tmp/workcell-home-${validator_uid}"
          validator_cache="${validator_home}/.cache"
          validator_tmp="${validator_home}/.tmp"
          bundle="workcell-${GITHUB_REF_NAME}.tar.gz"
          echo "BUNDLE_NAME=${bundle}" >> "${GITHUB_ENV}"
          docker run --rm \
            --user "${validator_uid}:${validator_gid}" \
            --entrypoint /bin/bash \
            -v "${PWD}:/workspace" \
            -v "${PWD}/dist:/dist" \
            -w /workspace \
            -e HOME="${validator_home}" \
            -e XDG_CACHE_HOME="${validator_cache}" \
            -e TMPDIR="${validator_tmp}" \
            -e SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            -e ARCHIVE_REF="${GITHUB_SHA}" \
            -e BUNDLE_NAME="${bundle}" \
            -e BUNDLE_PREFIX="workcell-${GITHUB_REF_NAME}/" \
            "workcell-validator:${GITHUB_SHA}" \
            -lc '
              set -euo pipefail
              mkdir -p "${HOME}" "${XDG_CACHE_HOME}" "${TMPDIR}"
              bundle_tar="/dist/${BUNDLE_NAME%.tar.gz}.tar"
              git -c safe.directory=/workspace archive \
                --format=tar \
                --mtime="@${SOURCE_DATE_EPOCH}" \
                --prefix="${BUNDLE_PREFIX}" \
                -o "${bundle_tar}" \
                "${ARCHIVE_REF}"
              gzip -n -9 < "${bundle_tar}" > "/dist/${BUNDLE_NAME}"
              rm -f "${bundle_tar}"
            '
          mkdir -p dist/source-tree
          tar -xzf "dist/${bundle}" -C dist/source-tree
          ln -sfn "source-tree/workcell-${GITHUB_REF_NAME}" dist/release-source
          echo "RELEASE_SOURCE_ROOT=dist/release-source" >> "${GITHUB_ENV}"
          ./scripts/generate-build-input-manifest.sh dist/workcell-build-inputs.json
          ./scripts/generate-builder-environment-manifest.sh dist/workcell-builder-environment.json

      - name: Re-verify pinned upstreams from archived source tree
        working-directory: dist/release-source
        run: |
          ./scripts/verify-upstream-codex-release.sh
          ./scripts/verify-upstream-claude-release.sh
          ./scripts/verify-upstream-gemini-release.sh
          ./scripts/update-upstream-pins.sh --check

      - name: Verify release bundle matches preflight
        run: |
          set -euo pipefail
          manifest="dist/preflight/workcell-release-bundle-preflight.json"
          bundle_name="$(jq -r '.bundle_name' "${manifest}")"
          expected_digest="$(jq -r '.bundle_sha256' "${manifest}")"
          actual_digest="$(sha256sum "dist/${bundle_name}" | awk '{print $1}')"
          if [[ "${actual_digest}" != "${expected_digest}" ]]; then
            echo "Release bundle digest mismatch: ${actual_digest} != ${expected_digest}" >&2
            exit 1
          fi

      - name: Regenerate build input manifest from archived source tree
        env:
          WORKCELL_BUILD_INPUT_ROOT: ${{ github.workspace }}/dist/release-source
          WORKCELL_BUILD_INPUT_REF: ${{ github.sha }}
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        run: ./scripts/generate-build-input-manifest.sh dist/workcell-build-inputs-archived.json

      - name: Regenerate control-plane manifest from archived source tree
        env:
          WORKCELL_CONTROL_PLANE_ROOT: ${{ github.workspace }}/dist/release-source
        run: ./scripts/generate-control-plane-manifest.sh dist/workcell-control-plane.json

      - name: Generate Homebrew formula asset
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bundle_sha="$(sha256sum "dist/${BUNDLE_NAME}" | awk '{print $1}')"
          ./scripts/generate-homebrew-formula.sh \
            "${GITHUB_REF_NAME}" \
            "${bundle_sha}" \
            dist/workcell.rb \
            --repository "${GITHUB_REPOSITORY}"

      - name: Verify build input manifest matches preflight
        run: |
          cmp -s \
            dist/workcell-build-inputs-archived.json \
            dist/preflight/workcell-build-inputs-preflight.json

      - name: Verify control-plane manifest matches preflight
        run: |
          cmp -s \
            dist/workcell-control-plane.json \
            dist/preflight/workcell-control-plane-preflight.json

      - id: build_amd64
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        with:
          build-args: |
            BUILDKIT_MULTI_PLATFORM=1
            SOURCE_DATE_EPOCH=${{ steps.source_date.outputs.epoch }}
          context: dist/release-source
          file: dist/release-source/runtime/container/Dockerfile
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true,rewrite-timestamp=true
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          tags: ${{ env.IMAGE_NAME }}

      - id: build_arm64
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        with:
          build-args: |
            BUILDKIT_MULTI_PLATFORM=1
            SOURCE_DATE_EPOCH=${{ steps.source_date.outputs.epoch }}
          context: dist/release-source
          file: dist/release-source/runtime/container/Dockerfile
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true,rewrite-timestamp=true
          platforms: linux/arm64
          provenance: mode=max
          sbom: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Verify published platform digests match preflight
        env:
          AMD64_DIGEST: ${{ steps.build_amd64.outputs.digest }}
          ARM64_DIGEST: ${{ steps.build_arm64.outputs.digest }}
        run: |
          set -euo pipefail

          inspect_raw() {
            docker buildx imagetools inspect --raw "$1"
          }

          resolve_published_platform() {
            local index_digest="$1"
            local platform="$2"
            local ref="${IMAGE_NAME}@${index_digest}"
            local os_name="${platform%%/*}"
            local arch="${platform#*/}"
            local document=""
            local media_type=""
            local image_manifest_digest=""
            local image_manifest=""
            local config_digest=""
            local -a candidate_digests=()

            document="$(inspect_raw "${ref}")"
            media_type="$(jq -r '.mediaType // empty' <<<"${document}")"

            case "${media_type}" in
              application/vnd.docker.distribution.manifest.v2+json|application/vnd.oci.image.manifest.v1+json)
                image_manifest_digest="${index_digest}"
                image_manifest="${document}"
                ;;
              application/vnd.docker.distribution.manifest.list.v2+json|application/vnd.oci.image.index.v1+json)
                mapfile -t candidate_digests < <(
                  jq -r --arg os "${os_name}" --arg arch "${arch}" '
                    .manifests // []
                    | map(select((.annotations["vnd.docker.reference.type"] // "") != "attestation-manifest"))
                    | map(select(.platform.os == $os and .platform.architecture == $arch))
                    | .[].digest
                  ' <<<"${document}"
                )
                if [[ "${#candidate_digests[@]}" -ne 1 ]]; then
                  echo "Expected exactly one published image manifest for ${platform} in ${ref}, found ${#candidate_digests[@]}" >&2
                  exit 1
                fi
                image_manifest_digest="${candidate_digests[0]}"
                if [[ "${image_manifest_digest}" != sha256:* ]]; then
                  echo "Malformed published image manifest digest for ${platform} in ${ref}: ${image_manifest_digest}" >&2
                  exit 1
                fi
                image_manifest="$(inspect_raw "${IMAGE_NAME}@${image_manifest_digest}")"
                ;;
              *)
                echo "Unsupported published descriptor media type for ${ref}: ${media_type}" >&2
                exit 1
                ;;
            esac

            config_digest="$(jq -r '.config.digest // empty' <<<"${image_manifest}")"
            if [[ "${config_digest}" != sha256:* ]]; then
              echo "Malformed published config digest for ${platform} in ${ref}: ${config_digest}" >&2
              exit 1
            fi

            printf '%s %s\n' "${image_manifest_digest}" "${config_digest}"
          }

          expected_manifest_amd64="$(jq -r '.platforms["linux/amd64"].image_manifest_digest' dist/preflight/workcell-runtime-preflight.json)"
          expected_config_amd64="$(jq -r '.platforms["linux/amd64"].config_digest' dist/preflight/workcell-runtime-preflight.json)"
          expected_manifest_arm64="$(jq -r '.platforms["linux/arm64"].image_manifest_digest' dist/preflight/workcell-runtime-preflight.json)"
          expected_config_arm64="$(jq -r '.platforms["linux/arm64"].config_digest' dist/preflight/workcell-runtime-preflight.json)"

          read -r actual_manifest_amd64 actual_config_amd64 < <(resolve_published_platform "${AMD64_DIGEST}" "linux/amd64")
          read -r actual_manifest_arm64 actual_config_arm64 < <(resolve_published_platform "${ARM64_DIGEST}" "linux/arm64")

          if [[ "${actual_manifest_amd64}" != "${expected_manifest_amd64}" ]] || \
             [[ "${actual_config_amd64}" != "${expected_config_amd64}" ]] || \
             [[ "${actual_manifest_arm64}" != "${expected_manifest_arm64}" ]] || \
             [[ "${actual_config_arm64}" != "${expected_config_arm64}" ]]; then
            echo "Published platform image/config digests differ from preflight" >&2
            echo "amd64: ${actual_manifest_amd64} ${actual_config_amd64} expected ${expected_manifest_amd64} ${expected_config_amd64}" >&2
            echo "arm64: ${actual_manifest_arm64} ${actual_config_arm64} expected ${expected_manifest_arm64} ${expected_config_arm64}" >&2
            exit 1
          fi

      - id: publish_manifest
        name: Publish deterministic multi-arch manifest
        env:
          AMD64_DIGEST: ${{ steps.build_amd64.outputs.digest }}
          ARM64_DIGEST: ${{ steps.build_arm64.outputs.digest }}
        run: |
          refs=(
            "${IMAGE_NAME}@${AMD64_DIGEST}"
            "${IMAGE_NAME}@${ARM64_DIGEST}"
          )
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            -t "${IMAGE_NAME}:sha-${GITHUB_SHA}" \
            "${refs[@]}"
          manifest_json="$(docker buildx imagetools inspect "${IMAGE_NAME}:${GITHUB_REF_NAME}" --format '{{json .Manifest}}')"
          image_manifests_json="$(jq -c '[.manifests[]? | select((.annotations["vnd.docker.reference.type"] // "") != "attestation-manifest")]' <<<"${manifest_json}")"
          platform_arches="$(jq -r '[.[].platform.architecture] | @json' <<<"${image_manifests_json}")"
          if [[ "${platform_arches}" != '["amd64","arm64"]' ]]; then
            echo "Deterministic multi-arch image manifest must contain exactly amd64 then arm64, found ${platform_arches}" >&2
            exit 1
          fi

          digest="$(jq -r '.digest // empty' <<<"${manifest_json}")"
          if [[ "${digest}" != sha256:* ]]; then
            echo "Unable to determine published manifest digest from imagetools inspect: ${digest}" >&2
            exit 1
          fi

          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          printf '%s@%s\n' "${IMAGE_NAME}" "${digest}" > dist/workcell-image.digest

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: workcell-source.spdx.json
          format: spdx-json
          output-file: dist/workcell-source.spdx.json
          path: dist/release-source
          syft-version: ${{ env.WORKCELL_SYFT_VERSION }}
          upload-artifact: false
          upload-release-assets: false

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: workcell-image.spdx.json
          format: spdx-json
          image: ${{ env.IMAGE_NAME }}@${{ steps.publish_manifest.outputs.digest }}
          output-file: dist/workcell-image.spdx.json
          syft-version: ${{ env.WORKCELL_SYFT_VERSION }}
          upload-artifact: false
          upload-release-assets: false

      - name: Generate release checksums
        run: |
          ./scripts/generate-release-checksums.sh dist/SHA256SUMS \
            "dist/${BUNDLE_NAME}" \
            dist/workcell.rb \
            dist/workcell-image.digest \
            dist/workcell-build-inputs.json \
            dist/workcell-control-plane.json \
            dist/workcell-builder-environment.json \
            dist/workcell-source.spdx.json \
            dist/workcell-image.spdx.json

      - name: Sign release image
        env:
          COSIGN_YES: "true"
          IMAGE_DIGEST: ${{ steps.publish_manifest.outputs.digest }}
        run: |
          cosign sign "${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Sign published source bundle
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle "dist/${BUNDLE_NAME}.sigstore.json" \
            "dist/${BUNDLE_NAME}"

      - name: Sign Homebrew formula asset
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell.rb.sigstore.json \
            dist/workcell.rb

      - name: Sign published image digest file
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell-image.digest.sigstore.json \
            dist/workcell-image.digest

      - name: Sign release checksums
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/SHA256SUMS.sigstore.json \
            dist/SHA256SUMS

      - name: Sign build input manifest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell-build-inputs.sigstore.json \
            dist/workcell-build-inputs.json

      - name: Sign control-plane manifest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell-control-plane.sigstore.json \
            dist/workcell-control-plane.json

      - name: Sign builder environment manifest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell-builder-environment.sigstore.json \
            dist/workcell-builder-environment.json

      - name: Sign published source SBOM
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell-source.spdx.sigstore.json \
            dist/workcell-source.spdx.json

      - name: Sign published image SBOM
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --bundle dist/workcell-image.spdx.sigstore.json \
            dist/workcell-image.spdx.json

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.publish_manifest.outputs.digest }}
          push-to-registry: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          sbom-path: dist/workcell-image.spdx.json
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.publish_manifest.outputs.digest }}
          push-to-registry: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/${{ env.BUNDLE_NAME }}

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          sbom-path: dist/workcell-source.spdx.json
          subject-path: dist/${{ env.BUNDLE_NAME }}

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/workcell.rb

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/workcell-image.digest

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/workcell-build-inputs.json

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/workcell-control-plane.json

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/workcell-builder-environment.json

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: env.ENABLE_GITHUB_ATTESTATIONS == 'true' && env.ENABLE_GITHUB_ATTESTATIONS_SUPPORTED == 'true'
        with:
          subject-path: dist/SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workcell-release-artifacts
          path: |
            dist/${{ env.BUNDLE_NAME }}
            dist/${{ env.BUNDLE_NAME }}.sigstore.json
            dist/workcell.rb
            dist/workcell.rb.sigstore.json
            dist/workcell-image.digest
            dist/workcell-image.digest.sigstore.json
            dist/workcell-build-inputs.json
            dist/workcell-build-inputs.sigstore.json
            dist/workcell-control-plane.json
            dist/workcell-control-plane.sigstore.json
            dist/workcell-builder-environment.json
            dist/workcell-builder-environment.sigstore.json
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json
            dist/workcell-source.spdx.json
            dist/workcell-source.spdx.sigstore.json
            dist/workcell-image.spdx.json
            dist/workcell-image.spdx.sigstore.json
          retention-days: 7

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/publish-github-release.sh "${GITHUB_REF_NAME}" \
            "dist/${BUNDLE_NAME}" \
            "dist/${BUNDLE_NAME}.sigstore.json" \
            dist/workcell.rb \
            dist/workcell.rb.sigstore.json \
            dist/workcell-image.digest \
            dist/workcell-image.digest.sigstore.json \
            dist/workcell-build-inputs.json \
            dist/workcell-build-inputs.sigstore.json \
            dist/workcell-control-plane.json \
            dist/workcell-control-plane.sigstore.json \
            dist/workcell-builder-environment.json \
            dist/workcell-builder-environment.sigstore.json \
            dist/SHA256SUMS \
            dist/SHA256SUMS.sigstore.json \
            dist/workcell-source.spdx.json \
            dist/workcell-source.spdx.sigstore.json \
            dist/workcell-image.spdx.json \
            dist/workcell-image.spdx.sigstore.json
