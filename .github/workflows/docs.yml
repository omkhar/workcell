name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "verify/**"
      - "workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "verify/**"
      - "workflows/**"
  workflow_dispatch:

permissions: {}

env:
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0039c1d47e8748b5afea56f4e85f14febaf34452bd99d9552d2daa82262b5cc5
  WORKCELL_BUILDX_VERSION: v0.33.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spelling-and-manpage:
    name: Spelling and manpage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Check docs spelling and manpage
        env:
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_MODE: gha
        run: ./scripts/ci/job-docs.sh
