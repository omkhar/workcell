name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "**/*.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "cmd/**"
      - "internal/**"
      - "scripts/check-doc-links.sh"
      - "scripts/check-doc-support-matrix-fields.sh"
      - "scripts/check-public-contract.sh"
      - "scripts/workcell"
      - "scripts/ci/job-docs.sh"
      - "verify/**"
      - "workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "**/*.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "cmd/**"
      - "internal/**"
      - "scripts/check-doc-links.sh"
      - "scripts/check-doc-support-matrix-fields.sh"
      - "scripts/check-public-contract.sh"
      - "scripts/workcell"
      - "scripts/ci/job-docs.sh"
      - "verify/**"
      - "workflows/**"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
  # Pinned identically to ci.yml and release.yml so all three workflows
  # share validator-image layer caches deterministically.
  WORKCELL_BUILDX_VERSION: v0.35.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spelling-and-manpage:
    name: Spelling and manpage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Check docs spelling and manpage
        env:
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_MODE: gha
          # docs.yml-scoped cache namespace to avoid colliding with the
          # validator-main / validator-pr-* scopes used by ci.yml.
          WORKCELL_VALIDATOR_BUILDX_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('validator-docs-pr-{0}', github.event.pull_request.number) || 'validator-docs-main' }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_WRITE_MODE: ${{ github.event_name == 'push' && 'max' || 'min' }}
        run: ./scripts/ci/job-docs.sh
