name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "verify/**"
      - "workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "verify/**"
      - "workflows/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spelling-and-manpage:
    name: Spelling and manpage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check pinned input policy
        run: ./scripts/check-pinned-inputs.sh

      - name: Build validation tool image
        run: |
          docker build \
            -f tools/validator/Dockerfile \
            -t "workcell-validator:${GITHUB_SHA}" \
            .

      - name: Check docs spelling and manpage
        run: |
          set -euo pipefail
          validator_uid="$(id -u)"
          validator_gid="$(id -g)"
          validator_home="/tmp/workcell-home-${validator_uid}"
          validator_cache="${validator_home}/.cache"
          validator_tmp="${validator_home}/.tmp"
          docker run --rm \
            --user "${validator_uid}:${validator_gid}" \
            --entrypoint /bin/bash \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e HOME="${validator_home}" \
            -e XDG_CACHE_HOME="${validator_cache}" \
            -e GOCACHE="${validator_cache}/go-build" \
            -e GOMODCACHE="${validator_cache}/go-mod" \
            -e CARGO_TARGET_DIR="${validator_cache}/cargo-target" \
            -e TMPDIR="${validator_tmp}" \
            "workcell-validator:${GITHUB_SHA}" \
            -lc '
              set -euo pipefail
              mkdir -p "${HOME}" "${XDG_CACHE_HOME}" "${GOCACHE}" "${GOMODCACHE}" "${CARGO_TARGET_DIR}" "${TMPDIR}"
              mapfile -d "" doc_files < <(
                find /workspace \
                  -path /workspace/.git -prune -o \
                  -path /workspace/dist -prune -o \
                  -path /workspace/tmp -prune -o \
                  -path /workspace/runtime/container/providers/node_modules -prune -o \
                  -path /workspace/runtime/container/rust/vendor -prune -o \
                  -path /workspace/runtime/container/rust/target -prune -o \
                  -type f \( -name "*.md" -o -name "*.txt" -o -name "*.1" \) -print0 | sort -z
              )
              codespell --config /workspace/.codespellrc "${doc_files[@]}"
              mandoc -Tlint /workspace/man/workcell.1 >/dev/null
            '
