name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "verify/**"
      - "workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - ".codespellrc"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "MAINTAINERS.md"
      - "README.md"
      - "ROADMAP.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "adapters/**"
      - "docs/**"
      - "man/**"
      - "policy/**"
      - "runtime/**"
      - "verify/**"
      - "workflows/**"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
  # Pinned identically to ci.yml and release.yml so all three workflows
  # share validator-image layer caches deterministically.
  WORKCELL_BUILDX_VERSION: v0.34.1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spelling-and-manpage:
    name: Spelling and manpage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Check docs spelling and manpage
        env:
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_MODE: gha
          # docs.yml-scoped cache namespace to avoid colliding with the
          # validator-main / validator-pr-* scopes used by ci.yml.
          WORKCELL_VALIDATOR_BUILDX_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('validator-docs-pr-{0}', github.event.pull_request.number) || 'validator-docs-main' }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_WRITE_MODE: ${{ github.event_name == 'push' && 'max' || 'min' }}
        run: ./scripts/ci/job-docs.sh
