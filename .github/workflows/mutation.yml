name: Mutation

# Scheduled and approved-heavy-ci lane that runs the mutation-score gate in the
# validator image. The gate itself (scripts/verify-mutation-score.sh) also runs
# locally in the release-preflight validate profile; this lane exercises it on a
# weekly cadence and on demand without adding the heavy harness to the PR path.

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  WORKCELL_BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
  WORKCELL_BUILDX_VERSION: v0.35.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Mutation score
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'approved-heavy-ci') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: true
          driver-opts: image=${{ env.WORKCELL_BUILDKIT_IMAGE }}
          version: ${{ env.WORKCELL_BUILDX_VERSION }}

      - name: Run mutation-score gate
        env:
          WORKCELL_VALIDATOR_IMAGE: workcell-validator:${{ github.sha }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_MODE: gha
          # Segregate the gha cache scope: a labeled PR writes to a PR-keyed
          # scope and only reads validator-main as a base, so PRs cannot poison
          # the trusted scope. Mirrors ci.yml's validate job.
          WORKCELL_VALIDATOR_BUILDX_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('validator-pr-{0}', github.event.pull_request.number) || 'validator-main' }}
          WORKCELL_VALIDATOR_BUILDX_CACHE_WRITE_MODE: ${{ github.event_name == 'push' && 'max' || 'min' }}
        run: ./scripts/ci/job-mutation.sh
