blank_issues_enabled: false
contact_links:
  - name: Usage and support discussions
    url: https://github.com/omkhar/workcell/discussions
    about: >
      Ask setup, workflow, and assurance-model questions in Discussions so the
      issue tracker can stay focused on actionable bugs and feature requests.
  - name: Support guide
    url: https://github.com/omkhar/workcell/blob/main/SUPPORT.md
    about: >
      Read the support guide before opening a bug report or feature request.
  - name: Security vulnerability
    url: https://github.com/omkhar/workcell/security/advisories/new
    about: >
      Report sandbox escapes, secret exposure, signing or provenance bypasses,
      or unexpected trust widening via private advisory. Do not open a public
      issue for security bugs.
