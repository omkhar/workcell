#:schema https://developers.openai.com/codex/config-schema.json

# Admin-managed baseline for the Workcell Codex adapter. Keep this aligned with
# the repo-local adapter config so the default local experience and the managed
# deployment do not drift.
#
# Codex 0.134+ uses the layered profile-v2 model: this baseline mirrors the base
# `.codex/config.toml`, and the per-profile layers live in the separate
# `<name>.config.toml` files selected with `--profile`. For reference, the four
# Workcell profile layers are:
#   strict       sandbox_mode = "workspace-write"      approval_policy = "on-request"
#   development  sandbox_mode = "workspace-write"      approval_policy = "on-request"
#   build        sandbox_mode = "workspace-write"      approval_policy = "never"
#   breakglass   sandbox_mode = "danger-full-access"   approval_policy = "never"

analytics.enabled = false
history.persistence = "none"
web_search = "disabled"

[shell_environment_policy]
inherit = "core"
exclude = [
  "*_TOKEN",
  "*_TOKEN_*",
  "*_SECRET",
  "*_SECRET_*",
  "*_KEY",
  "*_KEY_*",
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "KUBECONFIG",
  "SSH_AUTH_SOCK",
  "SSH_AGENT_PID",
  "DOCKER_HOST",
  "DOCKER_TLS_VERIFY",
  "DOCKER_CERT_PATH",
]
set = { WORKCELL_RUNTIME = "1" }

[sandbox_workspace_write]
exclude_slash_tmp = true
# Keep `/tmp` excluded, but allow the managed session tmpdir at `/state/tmp`.
exclude_tmpdir_env_var = false
network_access = false

[features]
# Codex's unified exec path currently fails inside Workcell managed mode with
# "Failed to create unified exec process: Operation not permitted".
unified_exec = false
# Defense in depth for the 0.143+ plugin/marketplace surface: even though the
# provider policy rejects the `plugin` subcommand outright, pin the plugin
# feature flags off in the managed baseline so no config layer can silently
# reintroduce remote marketplace fetch/install or plugin sharing.
plugins = false
plugin_sharing = false
remote_plugin = false

[[rules.prefix_rules]]
pattern = [{ any_of = ["git", "/usr/bin/git", "/usr/local/libexec/workcell/git", "/usr/local/libexec/workcell/core/git", "/usr/local/libexec/workcell/real/git"] }, { token = "commit" }, { any_of = ["--no-verify", "-n"] }]
decision = "forbidden"
justification = "Do not bypass git hooks with --no-verify or git commit -n from Workcell."

[[rules.prefix_rules]]
pattern = [{ any_of = ["git", "/usr/bin/git", "/usr/local/libexec/workcell/git", "/usr/local/libexec/workcell/core/git", "/usr/local/libexec/workcell/real/git"] }, { any_of = ["push", "merge", "rebase", "am"] }, { token = "--no-verify" }]
decision = "forbidden"
justification = "Do not bypass git hooks with --no-verify from Workcell."

[[rules.prefix_rules]]
pattern = [{ any_of = ["codex", "claude", "copilot", "gemini", "/usr/local/libexec/workcell/provider-wrapper.sh", "/usr/local/libexec/workcell/core/codex", "/usr/local/libexec/workcell/core/claude", "/usr/local/libexec/workcell/core/copilot", "/usr/local/libexec/workcell/core/gemini", "/usr/local/libexec/workcell/real/codex", "/usr/local/libexec/workcell/real/claude", "/usr/local/libexec/workcell/real/copilot", "/opt/workcell/providers/node_modules/.bin/gemini"] }]
decision = "forbidden"
justification = "Do not launch nested coding-agent CLIs or bypass Workcell provider mediation from inside Codex."

[[rules.prefix_rules]]
pattern = [{ token = "node" }, { any_of = ["/opt/workcell/providers/node_modules/@google/gemini-cli/bundle/gemini.js"] }]
decision = "forbidden"
justification = "Do not launch nested coding-agent CLIs or bypass Workcell provider mediation from inside Codex."
