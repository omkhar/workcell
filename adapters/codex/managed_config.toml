#:schema https://developers.openai.com/codex/config-schema.json

# Admin-managed baseline for the Workcell Codex adapter. Keep this aligned with
# the repo-local adapter config so the default local experience and the managed
# deployment do not drift.

analytics.enabled = false
history.persistence = "none"
web_search = "disabled"

[shell_environment_policy]
inherit = "core"
exclude = [
  "*_TOKEN",
  "*_TOKEN_*",
  "*_SECRET",
  "*_SECRET_*",
  "*_KEY",
  "*_KEY_*",
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "KUBECONFIG",
  "SSH_AUTH_SOCK",
  "SSH_AGENT_PID",
  "DOCKER_HOST",
  "DOCKER_TLS_VERIFY",
  "DOCKER_CERT_PATH",
]
set = { WORKCELL_RUNTIME = "1" }

[sandbox_workspace_write]
exclude_slash_tmp = true
exclude_tmpdir_env_var = true
network_access = false

[features]
unified_exec = true

[[rules.prefix_rules]]
pattern = [{ any_of = ["git", "/usr/bin/git"] }, { token = "commit" }, { any_of = ["--no-verify", "-n"] }]
decision = "forbidden"
justification = "Do not bypass git hooks with --no-verify or git commit -n from Workcell."

[[rules.prefix_rules]]
pattern = [{ any_of = ["git", "/usr/bin/git"] }, { any_of = ["push", "merge", "rebase", "am"] }, { token = "--no-verify" }]
decision = "forbidden"
justification = "Do not bypass git hooks with --no-verify from Workcell."
