#:schema https://developers.openai.com/codex/config-schema.json

# Admin-managed baseline for the Workcell Codex adapter. Keep this aligned with
# the repo-local adapter config so the default local experience and the managed
# deployment do not drift.

analytics.enabled = false
history.persistence = "none"
web_search = "disabled"
profile = "strict"

[shell_environment_policy]
inherit = "core"
exclude = [
  "*_TOKEN",
  "*_TOKEN_*",
  "*_SECRET",
  "*_SECRET_*",
  "*_KEY",
  "*_KEY_*",
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "KUBECONFIG",
  "SSH_AUTH_SOCK",
  "SSH_AGENT_PID",
  "DOCKER_HOST",
  "DOCKER_TLS_VERIFY",
  "DOCKER_CERT_PATH",
]
set = { WORKCELL_RUNTIME = "1" }

[sandbox_workspace_write]
exclude_slash_tmp = true
exclude_tmpdir_env_var = true
network_access = false

[features]
unified_exec = true

[profiles.strict]
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "disabled"

[profiles.development]
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "disabled"

[profiles.development.sandbox_workspace_write]
network_access = true

[profiles.build]
sandbox_mode = "workspace-write"
approval_policy = "never"
web_search = "disabled"

[profiles.build.sandbox_workspace_write]
network_access = true

[profiles.breakglass]
sandbox_mode = "danger-full-access"
approval_policy = "never"
web_search = "disabled"

[[rules.prefix_rules]]
pattern = [{ any_of = ["git", "/usr/bin/git", "/usr/local/libexec/workcell/git", "/usr/local/libexec/workcell/core/git", "/usr/local/libexec/workcell/real/git"] }, { token = "commit" }, { any_of = ["--no-verify", "-n"] }]
decision = "forbidden"
justification = "Do not bypass git hooks with --no-verify or git commit -n from Workcell."

[[rules.prefix_rules]]
pattern = [{ any_of = ["git", "/usr/bin/git", "/usr/local/libexec/workcell/git", "/usr/local/libexec/workcell/core/git", "/usr/local/libexec/workcell/real/git"] }, { any_of = ["push", "merge", "rebase", "am"] }, { token = "--no-verify" }]
decision = "forbidden"
justification = "Do not bypass git hooks with --no-verify from Workcell."

[[rules.prefix_rules]]
pattern = [{ any_of = ["codex", "claude", "gemini", "/usr/local/libexec/workcell/core/codex", "/usr/local/libexec/workcell/core/claude", "/usr/local/libexec/workcell/core/gemini", "/usr/local/libexec/workcell/real/codex", "/usr/local/libexec/workcell/real/claude", "/opt/workcell/providers/node_modules/.bin/gemini"] }]
decision = "forbidden"
justification = "Do not launch nested coding-agent CLIs or bypass Workcell provider mediation from inside Codex."

[[rules.prefix_rules]]
pattern = [{ token = "node" }, { any_of = ["/opt/workcell/providers/node_modules/@google/gemini-cli/dist/index.js"] }]
decision = "forbidden"
justification = "Do not launch nested coding-agent CLIs or bypass Workcell provider mediation from inside Codex."
