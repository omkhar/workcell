#:schema https://developers.openai.com/codex/config-schema.json

# Repo-local Codex defaults for the Workcell runtime. Keep this file usable as a
# standalone `.codex/config.toml` after copying it into a workspace.

profile = "strict"
analytics.enabled = false
history.persistence = "none"
web_search = "disabled"
project_doc_fallback_filenames = []
project_root_markers = [".git"]

[shell_environment_policy]
inherit = "core"
exclude = [
  "*_TOKEN",
  "*_TOKEN_*",
  "*_SECRET",
  "*_SECRET_*",
  "*_KEY",
  "*_KEY_*",
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "KUBECONFIG",
  "SSH_AUTH_SOCK",
  "SSH_AGENT_PID",
  "DOCKER_HOST",
  "DOCKER_TLS_VERIFY",
  "DOCKER_CERT_PATH",
]
set = { WORKCELL_RUNTIME = "1" }

[sandbox_workspace_write]
exclude_slash_tmp = true
# Keep `/tmp` excluded, but allow the managed session tmpdir at `/state/tmp`.
exclude_tmpdir_env_var = false
network_access = false

[features]
# Codex's unified exec path currently fails inside Workcell managed mode with
# "Failed to create unified exec process: Operation not permitted".
unified_exec = false

[profiles.strict]
sandbox_mode = "danger-full-access"
approval_policy = "on-request"
web_search = "disabled"

[profiles.development]
sandbox_mode = "danger-full-access"
approval_policy = "on-request"
web_search = "disabled"

[profiles.build]
sandbox_mode = "danger-full-access"
approval_policy = "never"
web_search = "disabled"

[profiles.breakglass]
sandbox_mode = "danger-full-access"
approval_policy = "never"
web_search = "disabled"
