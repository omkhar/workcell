# GitHub-hosted repository controls that live outside the git tree but remain
# part of the reviewed Workcell control plane.

[branch_integrity]
# These integrity controls stay enabled regardless of repository size:
# - require signed commits on the default branch
# - block force-pushes on the default branch
# - block deletion of the default branch
require_signed_commits = true
block_force_pushes = true
block_deletions = true

[branch_review]
# Valid modes:
# - "review-gated": require pull requests, at least one approving review,
#   code owner review, and resolved review threads
# - "single-owner-private-pr": require pull requests on a private user-owned
#   single-owner repository, but allow zero required approvals and no code
#   owner/thread gate so merges remain workable without an admin bypass
mode = "review-gated"

[release_environment]
# Valid modes:
# - "review-gated": require at least one human reviewer and no admin bypass;
#   upgrade to this once the repository is public (public repos on the free
#   plan can enforce environment reviewers, private repos cannot)
# - "single-owner-private": allow a private single-owner repo to use the
#   release environment without a reviewer gate
# - "plan-limited-private": lower-assurance fallback for private repositories
#   on GitHub plans that cannot enforce environment reviewers; the environment
#   must still exist, but reviewer gating is not available
mode = "review-gated"

[required_status_checks]
contexts = [
  "Validate repository",
  "Container smoke",
  "Reproducible build",
  "GitHub Actions lint",
  "GitHub Actions security analysis",
]

[repository_variables]
# The canonical Workcell repository always requests GitHub-native attestations
# when the platform supports them. Public repos support that path on all
# current plans; private/internal repos need explicit hosted-control approval
# because GitHub only supports them on Enterprise Cloud. Forks can loosen this
# policy, but the upstream repo treats both variables as part of the reviewed
# control plane so publication posture cannot silently drift.
WORKCELL_ENABLE_GITHUB_ATTESTATIONS = "true"
WORKCELL_ENABLE_PRIVATE_GITHUB_ATTESTATIONS = "false"
